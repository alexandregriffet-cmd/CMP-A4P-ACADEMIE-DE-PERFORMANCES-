<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Questionnaire CMP A4P</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="back-link" href="index.html">← Retour accueil</a>
      <img src="assets/logo-a4p.png" alt="A4P" class="topbar-logo" />
    </div>
  </header>

  <main class="container page-stack page-narrow">
    <section class="card intro-card">
      <p class="eyebrow">Questionnaire CMP A4P</p>
      <h1>Complète ton diagnostic</h1>
      <p class="lead">Réponds de manière spontanée à chaque affirmation. Il n’existe pas de bonne ou de mauvaise réponse.</p>

      <div class="identity-grid">
        <div class="field">
          <label for="prenom">Prénom</label>
          <input id="prenom" type="text" placeholder="Prénom" />
        </div>
        <div class="field">
          <label for="nom">Nom</label>
          <input id="nom" type="text" placeholder="Nom" />
        </div>
        <div class="field field-full">
          <label for="club">Club / structure</label>
          <input id="club" type="text" placeholder="Club / structure" />
        </div>
      </div>
    </section>

    <section class="card progress-card">
      <div class="progress-meta">
        <span id="progress-text">Progression 0 / 16</span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="progress-bar"><div id="progress-fill"></div></div>
    </section>

    <section id="questions-root" class="questions-stack"></section>

    <section class="sticky-actions">
      <div class="container sticky-inner">
        <button id="btn-reset" class="btn btn-secondary" type="button">Réinitialiser</button>
        <button id="btn-submit" class="btn btn-primary" type="button">Voir mon diagnostic CMP</button>
      </div>
    </section>
  </main>

  <script src="js/questions.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/profiles.js"></script>
  <script src="js/interpret.js"></script>
  <script src="js/hub-export.js"></script>
  <script src="js/test.js"></script>
</body>
</html>
