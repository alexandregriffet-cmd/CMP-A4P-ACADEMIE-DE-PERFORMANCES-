<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMP A4P — Questionnaire</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="text-link" href="index.html">← Retour accueil</a>
      <div class="progress-wrap">
        <div class="progress-meta">
          <span>Progression</span>
          <span id="progress-text">0 / 16</span>
        </div>
        <div class="progress"><div id="progress-fill" class="progress-fill"></div></div>
      </div>
    </header>

    <section class="card card-hero compact">
      <p class="eyebrow">Questionnaire CMP A4P</p>
      <h1>Complète ton diagnostic</h1>
      <p class="lead">
        Réponds de manière spontanée à chaque affirmation. Il n’existe pas de bonne ou de mauvaise réponse.
      </p>
    </section>

    <section class="card">
      <h2>Identité</h2>
      <div class="form-grid">
        <label>
          <span>Prénom</span>
          <input id="prenom" type="text" placeholder="Prénom" />
        </label>
        <label>
          <span>Nom</span>
          <input id="nom" type="text" placeholder="Nom" />
        </label>
        <label>
          <span>Club / structure</span>
          <input id="club" type="text" placeholder="Club / structure" />
        </label>
      </div>
    </section>

    <section id="questions-root"></section>

    <footer class="actions sticky-actions">
      <button id="btn-reset" class="btn btn-secondary" type="button">Réinitialiser</button>
      <button id="btn-finish" class="btn" type="button">Voir mon diagnostic CMP</button>
    </footer>
  </main>

  <script src="js/questions.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/profiles.js"></script>
  <script src="js/interpret.js"></script>
  <script src="js/hub-export.js"></script>
  <script src="js/test.js"></script>
</body>
</html>
